<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terapeutlista – LymForma™</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --sand:#f5f0e8;--warm:#e8dfd0;--muted:#b8a898;--brown:#6b5744;
  --deep:#3d2b1f;--gold:#9a7c5e;--accent:#c17f4e;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Jost','Trebuchet MS',sans-serif;
}
body{font-family:var(--sans);color:var(--deep);background:transparent;padding:0 0 48px;}
.lf-section{margin-top:48px;}
.lf-section:first-child{margin-top:0;}
.lf-section-header{display:flex;align-items:baseline;gap:14px;margin-bottom:8px;border-bottom:1px solid var(--warm);padding-bottom:10px;}
.lf-section-title{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--deep);letter-spacing:0.01em;}
.lf-section-subtitle{font-size:11px;color:var(--muted);font-weight:300;letter-spacing:0.06em;text-transform:uppercase;}
.lf-section-desc{font-size:15px;color:var(--brown);margin-bottom:18px;font-weight:300;line-height:1.6;}
.lf-search-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.lf-search-wrap{position:relative;flex:1 1 160px;}
.lf-search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:0.35;}
.lf-search-wrap input{width:100%;padding:9px 12px 9px 34px;font-family:var(--sans);font-size:14px;font-weight:300;color:var(--deep);background:#fff;border:1px solid var(--warm);border-radius:24px;outline:none;transition:border-color 0.2s;}
.lf-search-wrap input:focus{border-color:var(--gold);}
.lf-search-wrap input::placeholder{color:var(--muted);}
.lf-toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.lf-count{font-size:12px;color:var(--muted);font-weight:300;}
.lf-view-toggle{display:flex;gap:6px;}
.lf-view-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;font-family:var(--sans);font-size:12px;font-weight:400;color:var(--muted);background:#fff;border:1px solid var(--warm);border-radius:20px;cursor:pointer;transition:all 0.15s;}
.lf-view-btn:hover{color:var(--brown);border-color:var(--muted);}
.lf-view-btn.active{color:var(--deep);border-color:var(--gold);background:var(--sand);font-weight:500;}
.lf-table-wrap{overflow-x:auto;border:1px solid var(--warm);border-radius:8px;background:#fff;}
table.lf-table{width:100%;border-collapse:collapse;font-size:14px;}
.lf-table thead th{padding:11px 14px;text-align:left;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--gold);background:var(--sand);border-bottom:1px solid var(--warm);cursor:pointer;user-select:none;white-space:nowrap;}
.lf-table thead th:hover{color:var(--brown);}
.lf-sort{display:inline-block;margin-left:3px;font-size:9px;opacity:0.5;}
.lf-sort.asc::after{content:'▲';}.lf-sort.desc::after{content:'▼';}.lf-sort.none::after{content:'⇅';}
.lf-table tbody tr{border-bottom:1px solid var(--sand);transition:background 0.12s;}
.lf-table tbody tr:last-child{border-bottom:none;}
.lf-table tbody tr:hover{background:#faf7f3;}
.lf-table td{padding:12px 14px;vertical-align:top;line-height:1.5;}
.td-navn{font-family:var(--serif);font-size:16px;font-weight:600;white-space:nowrap;}
.td-stad{color:var(--brown);white-space:nowrap;font-size:14px;}
.td-tj{font-size:13px;color:var(--gold);max-width:220px;}
.td-kon a{color:var(--accent);text-decoration:none;font-size:13px;white-space:nowrap;display:block;}
.td-kon a:hover{text-decoration:underline;}
.td-web a{color:var(--brown);text-decoration:none;font-size:13px;white-space:nowrap;}
.td-web a:hover{color:var(--accent);}
.lf-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
.lf-card{background:#fff;border:1px solid var(--warm);border-radius:10px;padding:18px 20px;transition:box-shadow 0.2s,border-color 0.2s;}
.lf-card:hover{border-color:var(--muted);box-shadow:0 2px 12px rgba(61,43,31,0.07);}
.lf-card-navn{font-family:var(--serif);font-size:18px;font-weight:600;margin-bottom:3px;}
.lf-card-stad{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;}
.lf-card-tj{font-size:13px;color:var(--gold);line-height:1.5;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--sand);}
.lf-card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.lf-card-footer .kon a{font-size:13px;color:var(--accent);text-decoration:none;}
.lf-card-footer .kon a:hover{text-decoration:underline;}
.lf-card-footer .web a{font-size:12px;color:var(--brown);text-decoration:none;}
.lf-card-footer .web a:hover{color:var(--accent);}
.lf-empty{padding:32px;text-align:center;color:var(--muted);font-size:14px;font-style:italic;}
.lf-loading{padding:32px;text-align:center;color:var(--muted);font-size:14px;}
.lf-error{padding:16px 20px;background:#fff5f0;border:1px solid #f0c0a8;border-radius:8px;color:#8b3a1e;font-size:13px;}
@media(max-width:640px){
  .lf-section-title{font-size:22px;}
  .lf-view-toggle{display:none;}
  .lf-cards{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="lf-root"></div>
<script>
(function(){
var SHEET_ID='2PACX-1vQtIGSHfGi91bliBmAvfBNit0t76hlsIZpkyd8ckiz5blx1MArzPXZd2mlt4FHb1pSnePccuaGiYaU0';
var CSV_URL='https://docs.google.com/spreadsheets/d/e/'+SHEET_ID+'/pub?output=csv';
var LYM='LymForma\u2122';
var st={1:{data:[],filtered:[],sortCol:-1,sortDir:'none',vy:'tabell'},2:{data:[],filtered:[],sortCol:-1,sortDir:'none',vy:'tabell'}};

function sektion(s,titel,sub,desc){
  return '<div class="lf-section">'+
    '<div class="lf-section-header"><span class="lf-section-title">'+titel+'</span><span class="lf-section-subtitle">'+sub+'</span></div>'+
    '<p class="lf-section-desc">'+desc+'</p>'+
    '<div class="lf-search-row">'+sf(s,'f','S\u00f6k f\u00f6retag\u2026')+sf(s,'s','S\u00f6k stad\u2026')+sf(s,'t','S\u00f6k tj\u00e4nster\u2026')+'</div>'+
    '<div class="lf-toolbar"><span class="lf-count" id="c'+s+'"></span>'+
    '<div class="lf-view-toggle">'+
    '<button class="lf-view-btn active" id="bT'+s+'" onclick="sV('+s+',\'tabell\')">&#9783; Tabell</button>'+
    '<button class="lf-view-btn" id="bK'+s+'" onclick="sV('+s+',\'kort\')">&#9707; Kort</button>'+
    '</div></div>'+
    '<div id="T'+s+'" class="lf-table-wrap"><table class="lf-table"><thead><tr>'+
    '<th onclick="srt('+s+',0)">F\u00f6retag <span class="lf-sort none" id="a'+s+'0"></span></th>'+
    '<th onclick="srt('+s+',1)">Stad <span class="lf-sort none" id="a'+s+'1"></span></th>'+
    '<th onclick="srt('+s+',2)">Tj\u00e4nster <span class="lf-sort none" id="a'+s+'2"></span></th>'+
    '<th>Kontakt</th><th>Hemsida</th></tr></thead>'+
    '<tbody id="B'+s+'"><tr><td colspan="5" class="lf-loading">H\u00e4mtar lista</td></tr></tbody></table></div>'+
    '<div id="K'+s+'" class="lf-cards" style="display:none"></div></div>';
}
function sf(s,t,p){
  return '<div class="lf-search-wrap">'+
    '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#6b5744" stroke-width="1.3"/><line x1="9.5" y1="9.5" x2="13" y2="13" stroke="#6b5744" stroke-width="1.3" stroke-linecap="round"/></svg>'+
    '<input type="text" id="i'+s+t+'" placeholder="'+p+'" oninput="flt('+s+')"></div>';
}

document.getElementById('lf-root').innerHTML=
  sektion(1,'LymForma\u2122-diplomerade terapeuter','Certifierade av oss','Dessa terapeuter har genomg\u00e5tt utbildning hos LymForma\u2122 och \u00e4r diplomerade enligt v\u00e5r metod.')+
  sektion(2,'\u00d6vriga h\u00e4lsof\u00f6retagare','Rekommenderade av LymForma\u2122','H\u00e4lsof\u00f6retagare i Sverige och Norden som vi rekommenderar.');

function hamta(){
  fetch(CSV_URL).then(function(r){return r.text();}).then(function(csv){
    var rows=parseCSV(csv);
    if(rows.length<2){fel('Kalkylarket verkar tomt.');return;}
    var d1=[],d2=[];
    for(var i=1;i<rows.length;i++){
      var r=rows[i]; if(!r[0])continue;
      var h=r[5]||''; if(h&&h.indexOf('http')!==0)h='https://'+h;
      var o={foretag:r[0]||'',stad:r[1]||'',tjanster:r[2]||'',kontakt:r[3]||'',epost:r[4]||'',hemsida:h,kategori:(r[6]||'').trim()};
      if(o.kategori===LYM)d1.push(o);else d2.push(o);
    }
    st[1].data=d1;st[2].data=d2;flt(1);flt(2);
    if(window.innerWidth<=640){sV(1,'kort');sV(2,'kort');}
  }).catch(function(e){fel(e.message);});
}

function fel(m){
  var e='<tr><td colspan="5" class="lf-error">Kunde inte h\u00e4mta listan: '+esc(m)+'</td></tr>';
  document.getElementById('B1').innerHTML=e;
  document.getElementById('B2').innerHTML=e;
}

function parseCSV(txt){
  var rows=[],lines=txt.split('\n');
  for(var li=0;li<lines.length;li++){
    var line=lines[li].replace(/\r$/,'');
    if(!line.trim())continue;
    var cols=[],cur='',inQ=false;
    for(var i=0;i<line.length;i++){
      var c=line[i];
      if(c==='"'){inQ=!inQ;continue;}
      if(c===','&&!inQ){cols.push(cur.trim());cur='';}
      else cur+=c;
    }
    cols.push(cur.trim());rows.push(cols);
  }
  return rows;
}

function sV(s,vy){
  st[s].vy=vy;
  var T=document.getElementById('T'+s),K=document.getElementById('K'+s);
  var bT=document.getElementById('bT'+s),bK=document.getElementById('bK'+s);
  if(vy==='kort'){T.style.display='none';K.style.display='grid';bT.classList.remove('active');bK.classList.add('active');}
  else{T.style.display='';K.style.display='none';bT.classList.add('active');bK.classList.remove('active');}
  ren(s);
}
window.sV=sV;

function flt(s){
  var q1=(document.getElementById('i'+s+'f').value||'').toLowerCase();
  var q2=(document.getElementById('i'+s+'s').value||'').toLowerCase();
  var q3=(document.getElementById('i'+s+'t').value||'').toLowerCase();
  st[s].filtered=st[s].data.filter(function(r){
    return(!q1||r.foretag.toLowerCase().indexOf(q1)!==-1)&&
           (!q2||r.stad.toLowerCase().indexOf(q2)!==-1)&&
           (!q3||r.tjanster.toLowerCase().indexOf(q3)!==-1);
  });
  ren(s);
}
window.flt=flt;

function srt(s,col){
  var o=st[s];
  [0,1,2].forEach(function(i){var el=document.getElementById('a'+s+i);if(el)el.className='lf-sort none';});
  if(o.sortCol===col){o.sortDir=o.sortDir==='asc'?'desc':(o.sortDir==='desc'?'none':'asc');}
  else{o.sortCol=col;o.sortDir='asc';}
  var el=document.getElementById('a'+s+col);if(el)el.className='lf-sort '+o.sortDir;
  if(o.sortDir==='none'){flt(s);return;}
  var keys=['foretag','stad','tjanster'],key=keys[col];
  o.filtered.sort(function(a,b){var c=a[key].localeCompare(b[key],'sv');return o.sortDir==='asc'?c:-c;});
  ren(s);
}
window.srt=srt;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function ren(s){
  var o=st[s];
  var B=document.getElementById('B'+s),K=document.getElementById('K'+s),C=document.getElementById('c'+s);
  if(!o.filtered.length){
    if(B)B.innerHTML='<tr><td colspan="5" class="lf-empty">Inga tr\u00e4ffar.</td></tr>';
    if(K)K.innerHTML='<p class="lf-empty">Inga tr\u00e4ffar.</p>';
    if(C)C.textContent='';return;
  }
  if(C)C.textContent=o.filtered.length+' terapeut'+(o.filtered.length!==1?'er':'');
  var th='',kh='';
  for(var i=0;i<o.filtered.length;i++){
    var r=o.filtered[i];
    var host='';
    if(r.hemsida){host=r.hemsida.replace('https://','').replace('http://','').replace('www.','');if(host.slice(-1)==='/')host=host.slice(0,-1);}
    var kL=r.epost?'<a href="mailto:'+esc(r.epost)+'">Mejla '+esc(r.kontakt)+'</a>':(r.kontakt?esc(r.kontakt):'\u2014');
    var wT=r.hemsida?'<a href="'+esc(r.hemsida)+'" target="_blank" rel="noopener">'+esc(host)+'</a>':'\u2014';
    var wK=r.hemsida?'<a href="'+esc(r.hemsida)+'" target="_blank" rel="noopener">'+esc(host)+'</a>':'';
    th+='<tr><td class="td-navn">'+esc(r.foretag)+'</td><td class="td-stad">'+esc(r.stad)+'</td><td class="td-tj">'+esc(r.tjanster)+'</td><td class="td-kon">'+kL+'</td><td class="td-web">'+wT+'</td></tr>';
    kh+='<div class="lf-card"><div class="lf-card-navn">'+esc(r.foretag)+'</div><div class="lf-card-stad">'+esc(r.stad)+'</div><div class="lf-card-tj">'+esc(r.tjanster)+'</div><div class="lf-card-footer"><span class="kon">'+kL+'</span><span class="web">'+wK+'</span></div></div>';
  }
  if(B)B.innerHTML=th;
  if(K)K.innerHTML=kh;
}

hamta();

// Skicka höjd till föräldrasidan (för iframe auto-höjd)
function skickaHojd() {
  var h = document.body.scrollHeight;
  window.parent.postMessage({ type: 'lf-height', height: h }, '*');
}

// Skicka höjd när data laddats och när fönstret ändras
var _origRen = ren;
ren = function(s) { _origRen(s); setTimeout(skickaHojd, 50); };
window.addEventListener('resize', skickaHojd);
setTimeout(skickaHojd, 500);

})();
</script>
</body>
</html>
